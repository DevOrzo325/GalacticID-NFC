<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Redirect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Autoplay Video Element -->
    <video id="myVideo" autoplay muted playsinline>
        <source src="https://drive.google.com/file/d/1nUHfpPIZuIjj4dk04N_gzwoBM9LYcCRf/view?usp=sharing" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- JavaScript to trigger redirect -->
    <script>
        const video = document.getElementById("myVideo");
        
        video.onended = function() {
            window.location.href = "https://linktr.ee/offworldexports";
        };
    </script>
</body>
</html>
